appId: com.moshfeu.handymedia
productName: HandyMedia
directories:
  output: dist_build
  buildResources: build
files:
  - dist
  - dist-electron
  - package.json
  - node_modules
publish:
  provider: github
  owner: moshfeu
  repo: handymedia
mac:
  target:
    - dmg
    - zip
  icon: build/icons/icon.icns
  category: public.app-category.video
win:
  target:
    - nsis
  icon: build/icons/icon.ico
linux:
  target:
    - AppImage
    - deb
  icon: build/icons/
  category: Video
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
